<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoMaps</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #6c8ebf;
      --accent2:  #4a6fa5;
      --text:     #e2e4ea;
      --muted:    #7a7f94;
      --chip-bg:  #252837;
      --radius:   10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Map ── */
    #map { flex: 1; min-width: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 380px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 20px 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    #sidebar-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    #sidebar-header p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    #coords-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    #coords-text { font-family: monospace; color: var(--text); }

    /* ── Query area ── */
    #query-area { padding: 16px 20px; border-bottom: 1px solid var(--border); }

    #query-input {
      width: 100%;
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #query-input:focus { border-color: var(--accent); }

    #discover-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: var(--accent2);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.03em;
    }
    #discover-btn:hover:not(:disabled) { background: var(--accent); }
    #discover-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Results ── */
    #results-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* Spinner */
    #spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.82rem;
    }
    #spinner.active { display: flex; }

    .spin-ring {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Placeholder */
    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
      color: var(--muted);
      text-align: center;
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 20px;
    }
    #placeholder svg { opacity: 0.25; }

    /* Chunks */
    #chunks { display: none; }
    #chunks.active { display: block; }

    .chunk {
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 10px;
    }

    /* Sources */
    #sources-section { margin-top: 8px; }
    #sources-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      margin: 0 4px 6px 0;
      transition: border-color 0.2s;
    }
    .source-chip:hover { border-color: var(--accent); }

    /* Error */
    #error-box {
      display: none;
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 0.82rem;
      color: #e07070;
    }
    #error-box.active { display: block; }

    /* Leaflet pin override */
    .echomaps-pin {
      width: 14px; height: 14px;
      background: var(--accent);
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(108,142,191,0.7);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="sidebar">
    <div id="sidebar-header">
      <h1>EchoMaps</h1>
      <p>Click anywhere on the map to explore its history</p>
      <div id="coords-bar">
        <span>Location:</span>
        <span id="coords-text">—</span>
      </div>
    </div>

    <div id="query-area">
      <textarea id="query-input" rows="2"
        placeholder="Ask something about this place…">Tell me the history of this place</textarea>
      <button id="discover-btn" disabled>Discover</button>
    </div>

    <div id="results-area">
      <div id="placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="10" r="3"/>
          <path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/>
        </svg>
        <span>Click a location on the map,<br>then press <strong>Discover</strong>.</span>
      </div>

      <div id="spinner">
        <div class="spin-ring"></div>
        <span>Fetching historical context…</span>
      </div>

      <div id="error-box"></div>

      <div id="chunks"></div>

      <div id="sources-section" style="display:none">
        <div id="sources-title">Sources</div>
        <div id="sources-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:8000';

  // ── Map setup ──────────────────────────────────────────────────────────────
  const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);

  // CartoDB Dark Matter — free, no key required
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  }).addTo(map);

  // ── State ──────────────────────────────────────────────────────────────────
  let selectedLat = null;
  let selectedLon = null;
  let currentMarker = null;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const coordsText    = document.getElementById('coords-text');
  const queryInput    = document.getElementById('query-input');
  const discoverBtn   = document.getElementById('discover-btn');
  const spinner       = document.getElementById('spinner');
  const placeholder   = document.getElementById('placeholder');
  const chunksEl      = document.getElementById('chunks');
  const errorBox      = document.getElementById('error-box');
  const sourcesSection = document.getElementById('sources-section');
  const sourcesList   = document.getElementById('sources-list');

  // ── Map click ─────────────────────────────────────────────────────────────
  const pinIcon = L.divIcon({ className: '', html: '<div class="echomaps-pin"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });

  map.on('click', (e) => {
    selectedLat = e.latlng.lat;
    selectedLon = e.latlng.lng;

    coordsText.textContent = `${selectedLat.toFixed(5)}, ${selectedLon.toFixed(5)}`;
    discoverBtn.disabled = false;

    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker([selectedLat, selectedLon], { icon: pinIcon }).addTo(map);

    clearResults();
  });

  // ── Discover ──────────────────────────────────────────────────────────────
  discoverBtn.addEventListener('click', async () => {
    if (selectedLat === null) return;

    const query = queryInput.value.trim() || 'Tell me the history of this place';

    setLoading(true);
    clearResults();

    try {
      const res = await fetch(`${API_BASE}/api/location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat: selectedLat, lon: selectedLon, query }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      renderResults(data);
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  });

  // ── Render ────────────────────────────────────────────────────────────────
  function renderResults(data) {
    placeholder.style.display = 'none';

    const context = data.context || '';
    const chunks = context
      .split('\n\n---\n\n')
      .map(s => s.trim())
      .filter(Boolean);

    if (chunks.length === 0) {
      chunksEl.innerHTML = '<div class="chunk" style="color:var(--muted)">No historical information found for this location.</div>';
    } else {
      chunksEl.innerHTML = chunks
        .map(c => `<div class="chunk">${escapeHtml(c)}</div>`)
        .join('');
    }
    chunksEl.classList.add('active');

    const sources = data.sources || [];
    if (sources.length > 0) {
      sourcesList.innerHTML = sources
        .map(s => {
          const href = s.url ? `href="${escapeHtml(s.url)}" target="_blank" rel="noopener"` : '';
          const tag = s.url ? 'a' : 'span';
          return `<${tag} class="source-chip" ${href}>${escapeHtml(s.title || s.source)}</${tag}>`;
        })
        .join('');
      sourcesSection.style.display = 'block';
    }
  }

  function showError(msg) {
    placeholder.style.display = 'none';
    errorBox.textContent = `Error: ${msg}`;
    errorBox.classList.add('active');
  }

  function clearResults() {
    chunksEl.innerHTML = '';
    chunksEl.classList.remove('active');
    errorBox.textContent = '';
    errorBox.classList.remove('active');
    sourcesList.innerHTML = '';
    sourcesSection.style.display = 'none';
    placeholder.style.display = 'none';
  }

  function setLoading(on) {
    spinner.classList.toggle('active', on);
    discoverBtn.disabled = on;
    if (on) placeholder.style.display = 'none';
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
